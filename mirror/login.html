<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>VoucherSwap - Đăng nhập</title>
  <link rel="stylesheet" href="https://voucherswap.net/client-side/voucherswap/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="https://voucherswap.net/client-side/voucherswap/fonts/fontawesome/fontawesome.min.css">
  <style>
    body { background:#f5f5f5; font-family: 'Roboto', sans-serif; }
    .login-box {
      max-width: 420px;
      margin: 60px auto;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }
    .logo { text-align:center; margin-bottom:18px; }
    .logo img { height:52px; }
    .form-control { border-radius:10px; }
    .btn-success { width:100%; border-radius:10px; font-weight:700; }
    .small-link { margin-top:10px; text-align:center; }
    .alert { display:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <img src="https://voucherswap.net/images/voucherswaplogo1.png" alt="logo">
    </div>
    <h5 class="text-center mb-3">Đăng nhập</h5>
    <div id="msg" class="alert alert-danger" role="alert"></div>
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" class="form-control" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>API Base (tùy chọn)</label>
      <input id="apiBase" type="text" class="form-control" placeholder="https://api.voucherswap.net/api">
    </div>
    <div class="form-group">
      <label>Identity Base (tùy chọn)</label>
      <input id="identityBase" type="text" class="form-control" placeholder="https://identity.voucherswap.net">
    </div>
    <button id="loginBtn" class="btn btn-success">Đăng nhập</button>
    <div class="small-link">
      <a href="#" onclick="alert('Đăng ký sẽ dùng cùng API /users/Register'); return false;">Đăng ký</a>
    </div>
  </div>

  <script src="https://voucherswap.net/client-side/voucherswap/vendor/bootstrap/jquery-1.12.4.min.js"></script>
  <script src="./common.js"></script>
  <script>
    const msgEl = document.getElementById('msg');
    function showError(text) {
      msgEl.textContent = text;
      msgEl.style.display = 'block';
    }
    document.getElementById('loginBtn').addEventListener('click', async () => {
      msgEl.style.display = 'none';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const apiBase = document.getElementById('apiBase').value.trim();
      const identityBase = document.getElementById('identityBase').value.trim();

      if (!email || !password) { showError('Vui lòng nhập email và mật khẩu'); return; }

      const cfg = loadCfg();
      if (apiBase) cfg.apiBase = apiBase;
      if (identityBase) cfg.identityBase = identityBase;
      saveCfg(cfg);

      try {
        await loginWithPassword(email, password);
        window.location.href = './wallet.html';
      } catch (e) {
        showError(e.message);
      }
    });
  </script>
</body>
</html>
