services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:8080"
    command: npm start

  backup:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: npm run backup:daemon
    volumes:
      - ./backups:/app/backups
